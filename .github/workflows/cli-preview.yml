name: CLI Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      cli_version: ${{ steps.version.outputs.cli_version }}
      preview_tag: ${{ steps.version.outputs.preview_tag }}
      preview_version: ${{ steps.version.outputs.preview_version }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - uses: actions/checkout@v6
      - id: version
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || 'manual' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import pathlib
          import re

          cargo = pathlib.Path("apps/cli/Cargo.toml").read_text()
          match = re.search(r'^version = "([^"]+)"$', cargo, re.MULTILINE)
          if not match:
              raise SystemExit("Could not determine CLI version from apps/cli/Cargo.toml")

          cli_version = match.group(1)
          pr_number = os.environ["PR_NUMBER"]
          sha_short = os.environ["GITHUB_SHA"][:7]
          preview_tag = f"preview-pr-{pr_number}-{sha_short}"
          preview_version = f"{cli_version}-preview.pr.{pr_number}.{sha_short}"
          release_name = f"CLI Preview PR #{pr_number} ({sha_short})"

          print(f"cli_version={cli_version}")
          print(f"preview_tag={preview_tag}")
          print(f"preview_version={preview_version}")
          print(f"release_name={release_name}")
          PY

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build CLI preview archive
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --manifest-path apps/cli/Cargo.toml --target "${{ matrix.target }}"
          mkdir -p dist staging
          cp "target/${{ matrix.target }}/release/dec-bench" staging/dec-bench
          chmod +x staging/dec-bench
          archive="dec-bench-${{ needs.meta.outputs.preview_tag }}-${{ matrix.target }}.tar.gz"
          tar -C staging -czf "dist/${archive}" dec-bench
          shasum -a 256 "dist/${archive}" > "dist/${{ matrix.target }}-checksums.txt"
      - uses: actions/upload-artifact@v7
        with:
          name: cli-preview-${{ matrix.target }}
          path: dist/*

  smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: cli-preview-*
          path: dist
          merge-multiple: true
      - name: Verify installer against Linux preview archive
        shell: bash
        run: |
          set -euo pipefail
          linux_archive="$(ls dist/*x86_64-unknown-linux-gnu.tar.gz)"
          cat dist/*-checksums.txt > dist/checksums.txt
          python3 -m http.server 8765 --directory dist >/tmp/dec-bench-preview-installer.log 2>&1 &
          server_pid="$!"
          trap 'kill "$server_pid"' EXIT
          sleep 1
          DEC_BENCH_INSTALL_URL="http://127.0.0.1:8765/$(basename "$linux_archive")" \
          DEC_BENCH_INSTALL_CHECKSUM_URL="http://127.0.0.1:8765/checksums.txt" \
          DEC_BENCH_INSTALL_DIR="$RUNNER_TEMP/bin" \
          sh ./install.sh
          "$RUNNER_TEMP/bin/dec-bench" --help >/dev/null

  publish:
    needs: [meta, build, smoke]
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.publish.outputs.url }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: cli-preview-*
          path: dist
          merge-multiple: true
      - name: Build combined checksums file
        shell: bash
        run: |
          set -euo pipefail
          cat dist/*-checksums.txt > dist/checksums.txt
      - id: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.preview_tag }}
          name: ${{ needs.meta.outputs.release_name }}
          prerelease: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt

  comment:
    if: github.event_name == 'pull_request'
    needs: [meta, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        env:
          PREVIEW_TAG: ${{ needs.meta.outputs.preview_tag }}
          PREVIEW_VERSION: ${{ needs.meta.outputs.preview_version }}
          RELEASE_URL: ${{ needs.publish.outputs.release_url }}
        with:
          script: |
            const marker = '<!-- dec-bench-preview-install -->';
            const installScriptUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${context.sha}/install.sh`;
            const body = `${marker}
            Preview CLI build for \`${process.env.PREVIEW_VERSION}\` is ready.

            \`\`\`bash
            DEC_BENCH_INSTALL_VERSION=${process.env.PREVIEW_TAG} curl -fsSL ${installScriptUrl} | sh
            \`\`\`

            Release: ${process.env.RELEASE_URL || 'pending'}

            Version policy:
            - crate version: \`${{ needs.meta.outputs.cli_version }}\`
            - release tag: \`v${{ needs.meta.outputs.cli_version }}\`
            - preview tag: \`${process.env.PREVIEW_TAG}\`
            - default image suffix: \`v${{ needs.meta.outputs.cli_version }}\`
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
