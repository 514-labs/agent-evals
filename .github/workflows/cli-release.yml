name: CLI Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      cli_version: ${{ steps.version.outputs.cli_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import pathlib
          import re

          cargo = pathlib.Path("apps/cli/Cargo.toml").read_text()
          match = re.search(r'^version = "([^"]+)"$', cargo, re.MULTILINE)
          if not match:
              raise SystemExit("Could not determine CLI version from apps/cli/Cargo.toml")

          cli_version = match.group(1)
          release_tag = f"v{cli_version}"
          ref_name = os.environ["GITHUB_REF_NAME"]
          if ref_name != release_tag:
              raise SystemExit(
                  f"Git tag {ref_name} does not match apps/cli/Cargo.toml version {release_tag}"
              )

          print(f"cli_version={cli_version}")
          print(f"release_tag={release_tag}")
          PY

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build CLI archive
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --manifest-path apps/cli/Cargo.toml --target "${{ matrix.target }}"
          mkdir -p dist staging
          cp "target/${{ matrix.target }}/release/dec-bench" staging/dec-bench
          chmod +x staging/dec-bench
          archive="dec-bench-${{ needs.meta.outputs.release_tag }}-${{ matrix.target }}.tar.gz"
          tar -C staging -czf "dist/${archive}" dec-bench
          shasum -a 256 "dist/${archive}" > "dist/${{ matrix.target }}-checksums.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: cli-release-${{ matrix.target }}
          path: dist/*

  smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-release-*
          path: dist
          merge-multiple: true
      - name: Verify installer against Linux archive
        shell: bash
        run: |
          set -euo pipefail
          linux_archive="$(ls dist/*x86_64-unknown-linux-gnu.tar.gz)"
          cat dist/*-checksums.txt > dist/checksums.txt
          python3 -m http.server 8765 --directory dist >/tmp/dec-bench-release-installer.log 2>&1 &
          server_pid="$!"
          trap 'kill "$server_pid"' EXIT
          sleep 1
          DEC_BENCH_INSTALL_URL="http://127.0.0.1:8765/$(basename "$linux_archive")" \
          DEC_BENCH_INSTALL_CHECKSUM_URL="http://127.0.0.1:8765/checksums.txt" \
          DEC_BENCH_INSTALL_DIR="$RUNNER_TEMP/bin" \
          sh ./install.sh
          "$RUNNER_TEMP/bin/dec-bench" --help >/dev/null

  release:
    needs: [meta, build, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-release-*
          path: dist
          merge-multiple: true
      - name: Build combined checksums file
        shell: bash
        run: |
          set -euo pipefail
          cat dist/*-checksums.txt > dist/checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.release_tag }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
